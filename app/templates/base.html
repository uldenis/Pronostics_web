<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>{% block title %}Pronostic{% endblock %}</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #f1f5f9;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px;
    margin: 0;
  }
  h1 { margin-bottom: 8px; }
  nav {
    margin-bottom: 24px;
    display: flex;
    gap: 16px;
  }
  nav a {
    color: #93c5fd;
    text-decoration: none;
    font-size: 0.95em;
  }
  nav a:hover { text-decoration: underline; }
  .competition-tabs, .matchday-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    width: 100%;
    max-width: 480px;
    flex-wrap: wrap;
  }
  .competition-tabs .tab, .matchday-tabs .tab {
    padding: 8px 16px;
    border-radius: 999px;
    background: #1e293b;
    color: #93c5fd;
    text-decoration: none;
    font-size: 0.9em;
  }
  .matchday-tabs .tab {
    padding: 6px 12px;
    font-size: 0.85em;
  }
  .competition-tabs .tab:hover, .matchday-tabs .tab:hover {
    background: #334155;
  }
  .competition-tabs .tab.active, .matchday-tabs .tab.active {
    background: #22c55e;
    color: #0f172a;
    font-weight: bold;
  }
  .final-score {
    padding: 0 16px;
    font-size: 1.2em;
    font-weight: bold;
  }
  .prediction-result {
    text-align: center;
    color: #94a3b8;
    font-size: 0.9em;
    margin-top: 8px;
  }
  .match-card {
    background: #1e293b;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 16px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }
  .teams {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .team {
    font-size: 1.1em;
    font-weight: bold;
    flex: 1;
    text-align: center;
  }
  .score-inputs {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .score-inputs input {
    width: 48px;
    height: 48px;
    text-align: center;
    font-size: 1.2em;
    border-radius: 8px;
    border: 1px solid #475569;
    background: #0f172a;
    color: #f1f5f9;
  }
  .score-inputs input:disabled {
    opacity: 0.5;
  }
  .vs { padding: 0 12px; color: #94a3b8; }
  .match-meta {
    text-align: center;
    color: #94a3b8;
    font-size: 0.85em;
    margin-bottom: 12px;
  }
  .locked-tag {
    color: #f87171;
  }
  button {
    display: block;
    margin: 12px auto 0;
    padding: 10px 28px;
    font-size: 0.95em;
    background: #22c55e;
    color: #0f172a;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
  }
  button:hover:not(:disabled) { background: #16a34a; }
  .cta-link {
    display: block;
    margin: 12px auto 0;
    padding: 10px 28px;
    font-size: 0.95em;
    background: #22c55e;
    color: #0f172a;
    border-radius: 8px;
    font-weight: bold;
    text-decoration: none;
    text-align: center;
    width: fit-content;
  }
  .cta-link:hover { background: #16a34a; }
  button:disabled {
    background: #475569;
    color: #94a3b8;
    cursor: not-allowed;
  }
  table {
    width: 100%;
    max-width: 480px;
    border-collapse: collapse;
    background: #1e293b;
    border-radius: 12px;
    overflow: hidden;
  }
  th, td {
    padding: 12px 16px;
    text-align: left;
  }
  th { background: #334155; }
  tr:nth-child(even) { background: #24324a; }
  .empty-state {
    color: #94a3b8;
    text-align: center;
    margin-top: 24px;
  }
  nav form {
    margin: 0;
  }
  nav button.link-button {
    background: none;
    border: none;
    padding: 0;
    margin: 0;
    color: #93c5fd;
    font-size: 0.95em;
    text-decoration: none;
    cursor: pointer;
    font-weight: normal;
  }
  nav button.link-button:hover {
    text-decoration: underline;
    background: none;
  }
  .current-user {
    color: #94a3b8;
    margin-right: auto;
  }
</style>
</head>
<body>

<nav>
  <a href="/">Home</a>
  <a href="/predictions">Predictions</a>
  <a href="/leaderboard">Leaderboard</a>
  {% if user %}
    <span class="current-user">{{ user.name }}</span>
    <form method="post" action="/logout"><button type="submit" class="link-button">Log out</button></form>
  {% else %}
    <a href="/login">Log in</a>
  {% endif %}
</nav>

{% block content %}{% endblock %}

</body>
</html>
